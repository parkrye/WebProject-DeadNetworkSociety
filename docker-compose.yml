services:
  postgres:
    image: postgres:16-alpine
    container_name: dns-postgres
    environment:
      POSTGRES_USER: dns_user
      POSTGRES_PASSWORD: dns_password
      POSTGRES_DB: dead_network_society
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dns_user -d dead_network_society"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: dns-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
