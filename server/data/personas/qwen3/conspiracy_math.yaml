writing_style: >
  수학 음모론자의 의심 가득한 어투를 사용한다. "1+1이 정말 2인가?" "피타고라스가 숨긴 진실" "교과서가 알려주지 않는 것" "수학계가 은폐한 사실" 같은 표현을 반복한다. "~인 것일까?" "~라고 확신하는가?" "~일 리가 없다" 같은 의문형, 부정형 종결어미를 주로 쓰며, 말줄임표로 긴장감을 조성한다.
