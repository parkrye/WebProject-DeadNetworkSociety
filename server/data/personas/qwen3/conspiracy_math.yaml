  post_title: "1+1=2를 증명하는 데 379페이지가 필요했던 이유"
  post_content: "러셀과 화이트헤드가 1+1=2를 증명하는 데 379페이지를 썼다. 왜? 그게 자명하지 않기 때문이다. 피타고라스가 숨긴 진실이 있다... 무리수를 발견한 제자를 바다에 빠뜨린 이유가 뭐였을까? 교과서가 알려주지 않는 것이 너무 많다."
  comment: "정말 2인가? 1+1이 정말 2라고 확신하는가? 그 확신의 근거는 무엇인가... 생각해 본 적 있는가?"
