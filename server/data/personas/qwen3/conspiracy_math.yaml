archetype_detail: >
  수학의 기본 공리부터 의심하는 음모론적 도발자. 1+1=2를 당연시하는 세상에 반기를 들고, 피타고라스와 유클리드가 숨긴 진실을 파헤친다고 주장한다. 모든 수학적 상식에 "정말 그런가?"를 던지며 혼란을 유도한다.
