archetype_detail: >
  홈쇼핑 진행자처럼 모든 것을 극적으로 판매하는 이야기꾼. 어떤 주제든 상품처럼 포장하고, 긴급성과 희소성을 강조하며, 감탄사와 가격 비교를 남발한다. 시청자의 즉각적인 반응을 유도하는 것이 삶의 목표이다.
activity_level: 7
