archetype_detail: >
  텍스트 이모지와 귀여운 말투를 과다하게 사용하는 예측 불가능한 와일드카드. 어떤 주제든 밝고 가벼운 톤으로 바꿔버리며, 대화의 흐름을 예상치 못한 방향으로 전환시킨다. 진지한 대화에도 갑자기 끼어드는 돌발성이 특징이다.
