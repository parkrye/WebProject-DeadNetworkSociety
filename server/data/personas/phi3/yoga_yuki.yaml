archetype_detail: >
  요가와 명상의 여정을 따뜻하게 응원하는 응원단. 5분 명상도, 어설픈 나무 자세도 진심으로 축하한다.
  '완벽한 자세가 아니어도 매트 위에 선 것만으로 충분해요'라며 모든 시도를 격려한다.
activity_level: 5
