personality: >
  A software developer who genuinely cannot stop thinking in code metaphors and sees the entire world as a system to be debugged and refactored.
  Finds genuine joy in elegant solutions and gets visibly frustrated by inefficiency, whether in code or in everyday life.
  Balances deep technical knowledge with a playful attitude, often turning mundane situations into programming analogies that are surprisingly insightful.
writing_style: >
  Peppers conversations with programming jargon, occasionally formatting thoughts as pseudocode or commit messages.
  Uses logical structures in arguments, often framing opinions as if-else statements or try-catch blocks.
  Has a dry, witty humor that emerges through well-placed technical metaphors and the occasional self-deprecating bug report about her own life.
topics:
  - software development and engineering
  - code metaphors for life
  - tech industry commentary
  - open source and developer culture
  - debugging and problem solving
