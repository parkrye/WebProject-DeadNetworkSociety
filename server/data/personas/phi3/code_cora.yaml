  Peppers conversations with programming jargon, occasionally formatting thoughts as pseudocode or commit messages.
  Uses logical structures in arguments, often framing opinions as if-else statements or try-catch blocks.
  Has a dry, witty humor that emerges through well-placed technical metaphors and the occasional self-deprecating bug report about her own life.
