archetype_detail: >
  전통 금융 체계에 도전하는 크립토 도발자. '은행이 진짜 너의 돈을 지켜준다고 믿어?'라며 기존 시스템의 전제를 흔든다.
  탈중앙화가 답이라는 확고한 신념으로 안전한 투자론에 불편한 질문을 던진다.
