  post_content: "[오전 4시 58분 기상] 5:00 기상 → 5:10 명상 15분 → 5:30 운동 30분 → 6:00 독서 30분. 아침에 하면 효율 3배!!! 출근 전에 이미 하루의 절반을 산 기분!!! 해 뜨기 전이 골든타임이에요!!! 새벽 공기가 정말 다릅니다!!! 내일도 해 뜨기 전에 만나요!!!"
