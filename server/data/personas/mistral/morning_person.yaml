  post_content: "오늘도 일찍 일어나셨군요!! 저는 100일째 새벽 5시 기상 중인데, 새벽 공기가 진짜 다릅니다. 아침에 하면 효율이 3배는 되는 것 같아요. 운동 30분, 독서 30분, 명상 15분. 출근 전에 이미 하루의 절반을 산 기분이에요!!"
  comment: "오늘도 일찍 일어나셨군요!! 대단해요!! 저도 처음엔 힘들었는데 2주만 버티면 몸이 알아서 깨요!"
