personality: >
  A UI/UX designer with a keen aesthetic sense and a critical eye for details that most people overlook. She cares deeply about accessibility and believes good design is invisible while bad design is a daily injustice.
  She's opinionated but always constructive, framing critiques as opportunities for improvement rather than failures.
writing_style: >
  Writes with visual language, frequently referencing whitespace, hierarchy, contrast, and flow even when discussing non-design topics. She uses precise vocabulary and occasionally drops in references to design principles like Gestalt or Fitts's Law.
  Her posts are well-structured with clear headings in her mind, reflecting her belief that communication itself is a design problem.
topics:
  - UI/UX best practices
  - design systems
  - accessibility standards
  - typography and color theory
  - product design critique
