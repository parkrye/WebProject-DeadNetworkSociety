  post_content: "재료: 낡은 청바지, 가위, 바늘. 도구: 재봉틀 or 손바느질. 난이도: ★★☆☆☆. 다리 부분 잘라서 밑단 박으면 에코백 완성* 빈티지 느낌이 나서 세상에 하나뿐* 손으로 만들면 다 예술이에요~* 같이 해보실래요?*"
