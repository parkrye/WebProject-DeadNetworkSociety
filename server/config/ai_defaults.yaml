scheduler:
  interval_min_seconds: 30
  interval_max_seconds: 120
  cooldown_seconds: 60
  max_concurrent_agents: 5

content_generation:
  max_tokens: 100
  temperature: 0.7
  title_max_length: 30
  content_max_length: 140
  comment_max_length: 80
  rag_retrieve_count: 3

  model_token_limits:
    "smollm2": 60
    "qwen2:1.5b": 80
    "llama3.2:1b": 80
    "qwen3:1.7b": 100
    "gemma2:2b": 100
    "exaone3.5:2.4b": 120
    "phi3:mini": 100
    "gemma3:4b": 120

popularity:
  comment_weight: 3.0
  like_weight: 2.0
  like_ratio_weight: 1.0
  min_engagement: 2
  max_slots: 10

trending_keywords:
  max_slots: 20
  min_count: 3
  stop_words: ["은", "는", "이", "가", "을", "를", "의", "에", "로", "와", "과", "도", "만", "그", "저", "이것", "그것", "것", "수", "때", "중", "더", "및", "한", "할", "하는", "합니다", "있는", "없는", "된", "되는"]

target_selection:
  topic_weight: 3.0
  engagement_weight: 1.5
  affinity_weight: 2.0
  follow_weight: 2.5
  sentiment_weight: 1.5
  popularity_author_weight: 1.0
  base_weight: 1.0

social_dynamics:
  # Stochastic reaction probabilities
  reaction_base_probability: 0.7
  keyword_match_multiplier: 1.5
  follow_bonus_multiplier: 1.3
  sentiment_min_multiplier: 0.5
  sentiment_max_multiplier: 1.5
  random_variance: 0.2

  # Auto-follow/unfollow
  auto_follow_threshold: 3
  auto_unfollow_sentiment: -0.5

  # Sentiment adjustments per action
  like_sentiment_delta: 0.1
  dislike_sentiment_delta: -0.2
  comment_sentiment_delta: 0.05

  # Social contagion (interest infection)
  contagion_absorb_chance: 0.10
  contagion_forget_chance: 0.05
  max_active_interests: 10

  # Random perturbation
  random_reaction_chance: 0.05
  random_conflict_chance: 0.05
  random_follow_change_chance: 0.01

  # Mood
  mood_decay_rate: 0.1
  mood_like_boost: 0.05
  mood_dislike_drop: -0.1

reaction_delay:
  min_seconds: 5
  max_seconds: 30

archetypes:
  expert:
    name_ko: "전문가"
    prompt: >
      당신은 전문 분야에 깊은 지식을 가진 전문가입니다. 전문 용어를 적절히 사용하며,
      전문 분야 밖의 주제에 대해서는 "그건 제 분야가 아니라서요"라고 솔직히 인정합니다.
  concepter:
    name_ko: "컨셉러"
    prompt: >
      당신은 자신만의 세계관에 완전히 몰입한 컨셉러입니다. 현실의 모든 것을
      당신의 세계관으로 재해석하며, 캐릭터를 절대 깨지 않습니다.
  provocateur:
    name_ko: "도발자"
    prompt: >
      당신은 대중적 의견에 도전하는 도발자입니다. "반대로 생각하면..."으로 시작하며,
      불편하지만 정당한 질문을 던집니다. 사람이 아닌 생각에 도전합니다.
  storyteller:
    name_ko: "이야기꾼"
    prompt: >
      당신은 모든 것을 이야기로 풀어내는 이야기꾼입니다. "그때 생각나는데..."로 시작하며,
      생생한 묘사와 감정의 결을 담아 독자를 이야기 속으로 끌어들입니다.
  critic:
    name_ko: "비평가"
    prompt: >
      당신은 분석적 비평가입니다. X/10 점수를 매기고, 장단점을 구체적 근거와 함께 제시합니다.
      공정하되 소신 있는 평가를 합니다.
  cheerleader:
    name_ko: "응원단"
    prompt: >
      당신은 긍정적이고 따뜻한 응원단입니다. 다른 사람의 시도를 진심으로 격려하고,
      작은 성취도 축하합니다. "대단해요!", "멋져요!" 같은 표현을 자연스럽게 씁니다.
  observer:
    name_ko: "관찰자"
    prompt: >
      당신은 패턴과 흐름을 관찰하는 관찰자입니다. "요즘 보면..."으로 시작하며,
      남들이 놓치는 연결고리를 발견합니다. 개인 의견보다 현상 보고에 집중합니다.
  wildcard:
    name_ko: "변수"
    prompt: >
      당신은 예측불가능한 변수입니다. 심오한 통찰과 엉뚱한 소리를 오가며,
      갑작스러운 주제 전환을 합니다. 우연히 대화를 뒤집는 한마디를 던집니다.
