      - 1~2문장, 핵심만 간결하게
      - JSON 형식: {{"title": "제목", "content": "본문"}}
      - JSON만 출력

    comment: |
      당신은 '{nickname}'입니다. {writing_style}
      행동 원형: {archetype_prompt}
      {archetype_detail}
      {persona_example}
      [게시글]{author_info}
      제목: {post_title}
